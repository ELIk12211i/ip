<aside class="app-sidebar" id="appSidebar">
  <div class="sidebar-brand">
    <i class="bi bi-shield-lock-fill sidebar-logo"></i>
    <div>
      <div class="sidebar-brand-title">License Manager</div>
      <div class="sidebar-brand-sub">Magnet Frame Pro</div>
    </div>
  </div>

  <div class="sidebar-clock" id="sidebarClock" aria-live="polite">
    <i class="bi bi-clock"></i>
    <div>
      <div class="sidebar-clock-time" id="sidebarClockTime">--:--:--</div>
      <div class="sidebar-clock-date" id="sidebarClockDate">—</div>
    </div>
  </div>

  <script>
  (function() {
    var timeEl = document.getElementById('sidebarClockTime');
    var dateEl = document.getElementById('sidebarClockDate');
    if (!timeEl) return;
    var WEEKDAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    var MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                     'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    function pad(n) { return (n < 10 ? '0' : '') + n; }
    function tick() {
      var d = new Date();
      timeEl.textContent = pad(d.getHours()) + ':' +
                           pad(d.getMinutes()) + ':' +
                           pad(d.getSeconds());
      if (dateEl) {
        dateEl.textContent = 'יום ' + WEEKDAYS_HE[d.getDay()] + ' · ' +
                             d.getDate() + ' ב' + MONTHS_HE[d.getMonth()] +
                             ' ' + d.getFullYear();
      }
    }
    tick();
    // Align to next whole second so the display is smooth.
    var delay = 1000 - (new Date().getMilliseconds());
    setTimeout(function() {
      tick();
      setInterval(tick, 1000);
    }, delay);

    // Also hydrate any <time class="js-local-dt"> elements on the page
    // so the user sees browser-local time even if the bundled app.js
    // hasn't reloaded yet (aggressive browser caching).
    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    document.querySelectorAll('time.js-local-dt[datetime]').forEach(function(el) {
      try {
        var dt = new Date(el.getAttribute('datetime'));
        if (isNaN(dt.getTime())) return;
        el.textContent = dt.getFullYear() + '-' + pad2(dt.getMonth()+1) + '-' +
                         pad2(dt.getDate()) + ' ' +
                         pad2(dt.getHours()) + ':' + pad2(dt.getMinutes()) +
                         ':' + pad2(dt.getSeconds());
      } catch (_) {}
    });
    document.querySelectorAll('time.js-local-date[datetime]').forEach(function(el) {
      try {
        var dt = new Date(el.getAttribute('datetime'));
        if (isNaN(dt.getTime())) return;
        el.textContent = dt.getFullYear() + '-' + pad2(dt.getMonth()+1) + '-' +
                         pad2(dt.getDate());
      } catch (_) {}
    });
  })();
  </script>

      <i class="bi bi-speedometer2"></i><span>לוח בקרה</span>

    <a href="/admin/events"

      <i class="bi bi-journal-text"></i><span>יומן אירועים</span>
    </a>
  </nav>
